spring.main.banner-mode=off
spring.main.log-startup-info=false
logging.level.root=OFF

# In-memory H2 (one DB per JVM lifetime). Fresh state on every `java -jar`
# invocation, which is what the run-java.sh sandbox pattern needs.
spring.datasource.url=jdbc:h2:mem:add-policy-db;MODE=LEGACY;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.jpa.show-sql=false
