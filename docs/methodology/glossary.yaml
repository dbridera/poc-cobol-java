# Translation glossary — lightweight, repo-local "RAG" for COBOL → Java
#
# Purpose: Every Claude session that does translation should consult this file
# so naming and idiom mappings stay consistent across modules.
# Grow this file as new modules teach us new patterns. Keep entries terse.

version: 0.1

naming:
  # Internal "Named" conventions placeholder — replace with real rules when known.
  java_packages:
    base: "com.example.poc"     # TODO: replace with bank's actual base package
    pattern: "<base>.<domain>.<module>"
  java_classes:
    entity_suffix: "Entity"
    repository_suffix: "Repository"
    service_suffix: "Service"
    dto_suffix: "Dto"
  cobol_program_to_class: "PascalCase, drop trailing 'PROG'/'BAT' suffixes"
  cobol_paragraph_to_method: "camelCase, preserve verbs (e.g., '2000-CALC-INTEREST' -> calculateInterest)"

numerics:
  policy: "All COBOL numerics map to java.math.BigDecimal. Never double/float/int for money."
  policy_scope_note: |
    The rule is **unconditional** — it applies to loop indices, digit accumulators,
    check-digit operands, and other non-monetary integers too. Module 2
    (cci-account-converter) has zero monetary values yet still uses BigDecimal
    throughout the check-digit calculator per CLAUDE.md hard rule 1. This is
    deliberate: the rule's value is that it forecloses an entire class of bugs
    (silent precision loss, locale-dependent rounding) without per-field judgment
    calls. If a future module finds the BigDecimal overhead measurable, file an
    ADR-style exception with a specific perf benchmark.
  scale_rule: "scale = digits to the right of V; for PIC 9(7)V99 -> scale 2"
  default_rounding: "RoundingMode.HALF_UP"
  integer_truncation_rule: |
    For divisions whose result is stored back into an integer PIC (no V, no
    fractional retention), the rounding mode is **RoundingMode.DOWN**, not
    HALF_UP. COBOL's `WS-INT-FIELD = X / Y` with `WS-INT-FIELD PIC 9(N)`
    truncates the fractional part. Java: `dividend.divide(divisor, 0,
    RoundingMode.DOWN)`. **Empirically required on module 2** for the
    check-digit `sum / 10` step. Distinct from HALF_UP — they diverge whenever
    the units digit of the dividend is ≥ 5.
  pic_truncation_load_bearing: |
    A `PIC 9(N) := value` where `value > 10^N - 1` **silently keeps the low N
    digits**. This is sometimes the algorithm. Example: in BCTITSCV's mod-10
    check-digit, the formula yields `10` when `sum mod 10 == 0`; the assignment
    to `PIC 9(01)` truncates to `0` which is the correct check digit. Java
    must reproduce explicitly with `result.remainder(BigDecimal.valueOf(10^N))`
    or `result.mod(...)` — silently allowing 2-digit output where 1 was
    expected is a bug. **Empirically required on module 2.** Flag every
    `MOVE x-digit-value TO PIC 9(narrower)` in the spec.
  default_rounding_note: |
    COBOL `ROUNDED` (with no explicit MODE clause) is "round-to-nearest, ties away from zero"
    a.k.a. HALF_AWAY_FROM_ZERO. For NON-NEGATIVE values this is the same as Java's HALF_UP.
    For signed values, Java needs `RoundingMode.HALF_UP` AFTER applying abs() then re-attaching
    sign, OR the dedicated `HALF_DOWN`-with-sign-flip pattern. **Empirically verified on
    add-motor-policy module zero** (record 2: 512.50 -> 513, not 512).
    If a paragraph uses `ROUNDED MODE IS NEAREST-EVEN`, then Java must use HALF_EVEN instead.
    Always grep COBOL source for "ROUNDED MODE" before assuming the default.
  signed_handling: "PIC S9(...) -> BigDecimal can be negative; preserve sign byte interpretation"
  on_size_error: "Wrap in try/catch ArithmeticException -> SizeErrorException"
  on_size_error_note: |
    Verified on module zero (record 6 of 03-numeric-boundaries): 999999 accidents * 50
    overflows PIC 9(6)V99. The COBOL program sets RC=11 and rejects. Java must do the same:
    catch the arithmetic exception in the SAME paragraph (not at top of MAIN), and report
    the same return code with the same error string. Generic "throw RuntimeException" loses
    the granular RC.

idioms:
  mod_10_check_digit:
    pattern: |
      Pair of paragraphs that compute a Luhn-like check digit over a fixed-length
      digit string via alternating ×1 / ×2 multipliers, digit-sum extraction
      (`(x/10) + (x%10)`), and a final `((sum/10)*10 + 10) - sum` that relies on
      PIC truncation for the `sum mod 10 == 0` case.
    java: |
      Single `CheckDigitCalculator.compute(String digits) -> BigDecimal`. Use
      `RoundingMode.DOWN` on `sum.divide(TEN, 0)`. Finish with
      `result.remainder(TEN)` to model PIC 9(01) truncation. Worked example in
      [java/cci-account-converter/.../CheckDigitCalculator.java].
    note: |
      Recurring banking idiom — CCI (Peru), CBU (Argentina), IBAN, CLABE (Mexico),
      and most national interbank codes use a variant. Promote a shared
      `CheckDigitCalculator` to a `commons` package the first time a second
      module needs it.
  EVALUATE_TRUE:
    java: "switch expression with boolean cases, or rule chain when conditions are complex"
  PERFORM_THRU:
    java: "preserve fall-through by calling each paragraph-method in order; do NOT collapse"
    note: "fall-through is often load-bearing in banking code"
  PERFORM_VARYING:
    java: "for loop with explicit BigDecimal counter when counter is numeric"
  REDEFINES:
    java: "two view classes over the same byte[] OR sealed interface with explicit converter"
    note: "never silently treat the two views as the same type"
  REDEFINES_simple_alternative:
    when: "the two views are both flat groups of String / numeric sub-fields and the calling code always knows which view is in play"
    java: |
      A single `String` backing field plus per-view getter methods that
      `substring()` into the right offsets. e.g.
      `getOfiBcpIm()` reads bytes 8-10, `getOfiBcpSt()` reads bytes 7-9 of the
      same underlying string. Lighter than a sealed interface; valid when the
      family discriminator is itself a commarea field. **Empirically used on
      module 2 (cci-account-converter)** for the IM / ST views over the same
      20-byte commercial-account string.
    avoid: "If different REDEFINES groups would have different *types* (mix of String + BigDecimal + nested groups), use the sealed-interface form instead."
  OCCURS_DEPENDING_ON:
    java: "List<T> whose size is bound to the depending field; validate at construction"
  level_88:
    java: "boolean predicate method named after the 88 (e.g., 88 IS-VALID-CUSTOMER -> isValidCustomer())"
  IF_ELSE_chain:
    java: "early return when guard-style; nested else-if when truly mutually exclusive"

data_layer:
  copybook_record:
    target: "DTO / value object (record class in Java 21)"
    rule: "one DTO per copybook; field names in camelCase mirroring COBOL data names"
  copybook_db_row:
    target: "JPA @Entity"
    rule: "table name = COBOL table or VSAM file name (snake_case)"
  vsam_ksds:
    target: "Postgres table; primary key = VSAM key fields"
    note: |
      Module zero (add-motor-policy) uses ORGANIZATION IS LINE SEQUENTIAL (the
      GnuCOBOL analogue of VSAM ESDS) — the same SELECT/ASSIGN/OPEN/READ/WRITE
      pattern translates byte-exactly to java.nio.file.Files write/read. The
      "VSAM-equivalent" demo is module zero; no new module needed.
  vsam_esds:
    target: "Postgres table with surrogate auto PK + insertion-order timestamp"
  vsam_rrds:
    target: "Postgres table with relative_record_no integer column"
  db2_cursor:
    target: "Spring Data Stream<T> or paginated findAllByX"
  file_status:
    target: "typed exception or Result/Optional return; never silently ignored"
  select_assign_line_sequential:
    target: "java.nio.file.Files write/read with US_ASCII + LF line endings"
    note: "Module zero proven. Use StandardCharsets.US_ASCII; never the platform default."

# Module 1B (add-policy-db) empirical findings — DB / EXEC SQL → JPA pattern.
db_access:
  exec_sql_insert:
    target: "EntityManager.persist(entity); em.flush()"
    avoid: "JpaRepository.save(entity) — this is INSERT-OR-UPDATE (MERGE) semantics, not INSERT"
    note: |
      **Empirically caught by add-policy-db fixture 02-sql-errors.** A naive
      save() translation silently overwrites an existing row with the same PK
      while COBOL EXEC SQL INSERT throws SQLCODE -803 (UNIQUE constraint).
      The byte-exact diff caught a 4-row vs 3-row miscount and a corrupted
      first row. Always use persist() + flush() for INSERT semantics.
  exec_sql_select_single:
    target: "repository.findById() or findBy<Field>()"
  exec_sql_select_into_host_var:
    target: "repository.findBy<...>().orElseThrow(...) — typed exception on missing"
  exec_sql_fetch_cursor:
    target: "Spring Data Stream<T> or paginated query (defer to a module that needs it)"
  identity_val_local:
    target: "entity returned by persist()/save() has @GeneratedValue populated"
    note: |
      For byte-exact reproducibility module 1B uses fixture-controlled PKs
      (no DB-side DEFAULT). Production translations should use @GeneratedValue
      and accept that the *value* is non-deterministic; the equivalence harness
      then masks the PK column from the diff.
  current_timestamp_default:
    target: "@CreationTimestamp (with determinism caveat)"
    note: "Module 1B pins LASTCHANGED via fixture for byte-exact diff; production uses @CreationTimestamp."
  sqlcode_minus_530_fk_violation:
    target: "DataIntegrityViolationException → typed domain exception (e.g., PolicyForeignKeyException) + per-paragraph RC"
  sqlcode_generic_error:
    target: "PersistenceException → typed RuntimeException + per-paragraph RC=90"
  transaction_boundary:
    target: "@Transactional(propagation = REQUIRES_NEW) on the persist() service method"
    note: |
      Each request = one CICS transaction = one Spring transaction. REQUIRES_NEW
      ensures a constraint failure on record N doesn't poison the inner JPA
      session for record N+1.

# Module 1A (add-policy-facade) empirical findings — CICS orchestrator pattern.
orchestration:
  exec_cics_link_program:
    target: "@Autowired service-to-service call (same JVM) or RestTemplate (cross-service)"
    note: |
      Module 1A proves the same-JVM case: PolicyFacadeService → PolicyInsertService.
      Cross-service mapping (REST/gRPC) is deferred to a future module that needs it.
  exec_cics_return:
    target: "method return + populated DTO (mutated commarea equivalent)"
  exec_cics_abend_abcode:
    target: "typed CicsAbendException(code) propagated up the stack"
  exec_cics_asktime_formattime:
    target: "java.time.LocalDateTime.now() / Instant.now() — use Clock injection for testability"
  eibcalen_length_check:
    target: "method-level validation on the parsed DTO (null checks, required fields)"
    note: "Batch mode doesn't have a commarea length; map to field-presence + value checks."
  cobol_call_nested_program:
    target: "Direct method call between Spring @Service beans (same DI graph)"
    note: |
      GnuCOBOL's nested-program CALL is the local equivalent of CICS LINK PROGRAM.
      In Java both collapse to a method call — what matters for the audience is
      that ONE program/service hands off to ANOTHER, and the byte-exact diff
      proves the chain preserves observable behavior.

control_flow:
  go_to:
    rule: "GO TO is rare in well-structured COBOL; if encountered, refactor to method calls but document the original target paragraph in a traceability comment"
  exit_program:
    java: "return; from the entry method"
  stop_run:
    java: "in batch mode -> System.exit(0); in service mode -> normal return"

testing:
  golden_master:
    rule: "Every paragraph must be exercised by ≥1 input fixture before translation is considered done"
  numeric_property_tests:
    library: "jqwik"
    rule: "For any paragraph touching arithmetic, generate property-based tests around boundaries (max PIC, min PIC, zero, negative if signed)"
  boundary_fixtures:
    must_include:
      - "max value of every PIC numeric field"
      - "min (or 0) value of every PIC numeric field"
      - "all-spaces / low-values / high-values for every PIC X field"
      - "boundary of OCCURS DEPENDING ON (0, 1, max)"

forbidden:
  - "double or float for any COBOL numeric"
  - "silent rounding without explicit RoundingMode"
  - "removing 'dead' COBOL paragraphs without proof they are unreachable from any entry point"
  - "merging REDEFINES views into a single type without a converter"
  - "skipping golden-master diff before declaring a module done"
